---
name: Markdown Lint

on:
  push:
    branches: ["**"]
    paths:
      - "**.md"
  pull_request:
    branches: ["**"]
    paths:
      - "**.md"
  workflow_dispatch:

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
