---
name: Markdown Lint

on:
  push:
    branches: ["**"]
    paths:
      - "**.md"
  pull_request:
    branches: ["**"]
    paths:
      - "**.md"

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
