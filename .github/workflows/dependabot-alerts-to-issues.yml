---
name: Dependabot Alerts to Issues

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Open issues for new Dependabot alerts
    runs-on: ubuntu-latest

    steps:
      - name: Check required secret is set
        run: |
          if [ -z "${{ secrets.DEPENDABOT_ALERTS_TOKEN }}" ]; then
            echo "::error::DEPENDABOT_ALERTS_TOKEN secret is not set. The default"
            echo "::error::GITHUB_TOKEN can never read the Dependabot alerts API"
            echo "::error::(GitHub platform limitation, not a workflow bug)."
            echo "::error::Create a fine-grained PAT scoped to this repo with"
            echo "::error::'Dependabot alerts: Read-only' and add it as the"
            echo "::error::DEPENDABOT_ALERTS_TOKEN repository secret."
            exit 1
          fi

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create security --repo "$REPO" --color B60205 --description "Security-related issue" || true
          gh label create dependencies --repo "$REPO" --color 0366d6 --description "Dependency updates" || true

      - name: Fetch open Dependabot alerts
        # This call needs the fine-grained PAT - the default GITHUB_TOKEN is
        # never accepted by the Dependabot alerts API, regardless of the
        # `permissions:` block above (confirmed GitHub platform limitation).
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_ALERTS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/dependabot/alerts?state=open" --paginate > alerts.json
          echo "Found $(jq 'length' alerts.json) open Dependabot alert(s)."

      - name: Open issues for new alerts
        # Back to the normal GITHUB_TOKEN here - creating issues only needs
        # issues: write, which GITHUB_TOKEN already has.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          jq -c '.[]' alerts.json | while read -r alert; do
            ghsa=$(echo "$alert" | jq -r '.security_advisory.ghsa_id')
            package=$(echo "$alert" | jq -r '.dependency.package.name')
            severity=$(echo "$alert" | jq -r '.security_advisory.severity')
            summary=$(echo "$alert" | jq -r '.security_advisory.summary')
            html_url=$(echo "$alert" | jq -r '.html_url')
            title="Dependabot alert: $package ($severity) - $ghsa"

            existing=$(gh issue list --repo "$REPO" --search "\"$ghsa\" in:body" --state all --json number --jq '.[0].number // empty')
            if [ -n "$existing" ]; then
              echo "Skipping $ghsa, already tracked in issue #$existing"
              continue
            fi

            body="Dependabot found a vulnerability that hasn't been resolved yet.

          - Package: $package
          - Severity: $severity
          - Advisory: $ghsa
          - Summary: $summary
          - Details: $html_url

          This issue was opened automatically because Dependabot alerts live in the
          Security tab and don't otherwise show up as issues. Closing this issue
          does not resolve the underlying alert - resolve it via the linked
          Dependabot PR or by dismissing the alert directly."

            gh issue create --repo "$REPO" --title "$title" --body "$body" --label "security,dependencies"
            echo "Opened issue for $ghsa"
          done
