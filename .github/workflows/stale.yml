---
name: Stale

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues
    runs-on: ubuntu-latest

    steps:
      - name: Run stale action
        uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has had no activity for 30 days and has been marked as stale.
            It will be closed automatically in 7 days unless there is new activity.
          close-issue-message: >
            This issue was closed automatically due to inactivity.
            Feel free to reopen it if the problem persists.
          exempt-issue-labels: "pinned,security,bug"
