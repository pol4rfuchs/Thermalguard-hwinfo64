---
name: PSScriptAnalyzer

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint PowerShell
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Severity Error, Warning `
            -IncludeDefaultRules

          if ($results) {
            $results | Format-Table -AutoSize -Property Severity, RuleName, Line, Message
          } else {
            Write-Host "No issues found."
          }

          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) {
            Write-Error "PSScriptAnalyzer found $($errors.Count) error(s). Failing build."
            exit 1
          }
