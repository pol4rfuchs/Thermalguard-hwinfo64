---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for test release, e.g. v1.5-test (no spaces)"
        required: true
        default: "v0.0-test"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = $env:GITHUB_REF_NAME
          }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Using tag: $tag"

      - name: Validate tag format
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          # Git tags can't contain whitespace or most special characters.
          # This also catches the "v1.42 stable" style typo before it hits
          # the GitHub API and fails with a cryptic 422.
          if ($tag -notmatch '^v[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9][A-Za-z0-9.-]*)?$') {
            Write-Error "Invalid tag: '$tag'. Expected format like v1.42 or v1.42-test (no spaces, must start with v<major>.<minor>)."
            exit 1
          }
          Write-Host "Tag '$tag' is valid."

      - name: Build ZIP archive
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $archive = "ThermalGuard-$tag.zip"

          $files = @(
            "HWiNFO-ThermalGuard.ps1",
            "Start-HWiNFO-Remote.bat",
            "Start-HWiNFO-Remote.vbs",
            "Install-ScheduledTask.ps1",
            "Get-SensorDump.ps1",
            "README.md",
            "README.en.md",
            "LICENSE"
          )

          foreach ($f in $files) {
            if (-not (Test-Path $f)) {
              Write-Error "Expected file not found: $f"
              exit 1
            }
          }

          Compress-Archive -Path $files -DestinationPath $archive -CompressionLevel Optimal
          Write-Host "Created $archive ($($(Get-Item $archive).Length) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          files: ThermalGuard-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
