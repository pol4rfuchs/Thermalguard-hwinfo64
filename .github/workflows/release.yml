---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for test release (e.g. v1.5-test)"
        required: true
        default: "v0.0-test"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = $env:GITHUB_REF_NAME
          }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Using tag: $tag"

      - name: Build ZIP archive
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $archive = "ThermalGuard-$tag.zip"

          $files = @(
            "HWiNFO-ThermalGuard.ps1",
            "Start-HWiNFO-Remote.bat",
            "Start-HWiNFO-Remote.vbs",
            "README.md",
            "LICENSE"
          )

          foreach ($f in $files) {
            if (-not (Test-Path $f)) {
              Write-Error "Expected file not found: $f"
              exit 1
            }
          }

          Compress-Archive -Path $files -DestinationPath $archive -CompressionLevel Optimal
          Write-Host "Created $archive ($($(Get-Item $archive).Length) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          files: ThermalGuard-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
