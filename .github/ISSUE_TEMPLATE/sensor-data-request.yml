name: "Sensor data: help expand or verify hardware support"
description: "Share your HWiNFO sensor readings to add unsupported hardware or verify hardware marked as untested."
title: "[sensor-data] "
labels:
  - "sensor-data"
  - "help wanted"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping out! There are two ways this helps, depending on your hardware:

        - **Not supported yet** (Intel CPU, Intel Arc GPU): we need real sensor
          labels from your system to add support at all, since these use
          completely different sensor names than AMD/NVIDIA.
        - **Should work, but unverified** (AMD AM5 CPUs, NVIDIA RTX 20/30/40,
          AMD RX 6000/7000): these reuse the same sensor labels as already-tested
          hardware, so they probably work - but nobody's confirmed it on real
          hardware yet. Your dump moves these from "should work" to "confirmed"
          in the README.

        This takes about 2-3 minutes:
        1. Make sure HWiNFO64 + RemoteHWInfo are running (same setup ThermalGuard needs)
        2. Download and run `Get-SensorDump.ps1` from the repo's root folder
        3. It samples for at least 120 seconds - start a game or some load
           partway through if you can, so both idle and load values get
           captured, not just idle
        4. Paste the output below, or attach the generated `.txt` file

        The script only reads your local sensor values (temps, clocks, power,
        fans) - no personal info, no auto-upload. Please review the output
        yourself before pasting, same as with any data you share online.

  - type: dropdown
    id: hardware-type
    attributes:
      label: What hardware is this data for?
      description: "Not supported yet vs. should-work-but-unverified - see the intro above."
      options:
        - "Intel CPU (not supported yet)"
        - "Intel Arc GPU (not supported yet)"
        - "AMD CPU - AM5 / Ryzen 7000-9000 (unverified)"
        - "NVIDIA GPU - RTX 20/30/40, Turing-Ada (unverified extended sensors)"
        - "AMD GPU - RX 6000/7000, RDNA2/3 (unverified)"
        - "Other / not sure"
    validations:
      required: true

  - type: input
    id: cpu-model
    attributes:
      label: CPU model
      placeholder: "e.g. Intel Core i7-14700K / AMD Ryzen 9 9950X3D"
    validations:
      required: false

  - type: input
    id: gpu-model
    attributes:
      label: GPU model
      placeholder: "e.g. AMD RX 9070 XT / Intel Arc B580 / RTX 4080"
    validations:
      required: false

  - type: input
    id: os-version
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 24H2"
    validations:
      required: false

  - type: input
    id: hwinfo-version
    attributes:
      label: HWiNFO / RemoteHWInfo version
      placeholder: "e.g. HWiNFO 8.06, RemoteHWInfo v0.5"
    validations:
      required: false

  - type: textarea
    id: sensor-dump
    attributes:
      label: Sensor dump
      description: "Paste the output of Get-SensorDump.ps1 here (or leave empty and attach the .txt file to this issue instead)."
      render: text
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: Confirmation
      options:
        - label: I've reviewed the sensor dump and I'm okay sharing it publicly in this issue.
          required: true
